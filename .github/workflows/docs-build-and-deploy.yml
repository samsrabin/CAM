name: Build and deploy docs

on:
  push:
    # Run when a change to these files is pushed to any of these branches.
    branches: ['main', 'cam6-users-guide', 'cam6.3-users-guide']
    # And specifically, only when these files are updated:
    paths:
      - 'doc/**'
      - '.github/workflows/docs-build-and-deploy.yml'
      - '.github/workflows/docs-build_to_publish-optionally-deploy.yml'
    # And also make sure to add any files that you "include" in your docs that live outside doc/

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  build-and-deploy:
    name: Call reusable workflow with deploy true

    # Only run on upstream repository.
    if: ${{ github.repository == 'NCAR/CAM' }}

    # Grant the GITHUB_TOKEN the write scopes needed to deploy to GitHub Pages.
    permissions:
      contents: read
      pages: write
      id-token: write

    uses: ./.github/workflows/docs-build_to_publish-optionally-deploy.yml
    with:
      deploy: true
