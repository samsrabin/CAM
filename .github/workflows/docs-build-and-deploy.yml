name: Deploy static content to Pages

on:
  push:
    # Run when a change to these files is pushed to any of these branches.
    branches: ['main', 'cam6-users-guide', 'cam6.3-users-guide']
    # And specifically, only when a file in the doc/ directory is updated.
    paths:
      - 'doc/**'
    # And also make sure to add any files that you "include" in your docs that live outside doc/

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  build-and-deploy:

    # Only run on upstream repository.
    if: ${{ github.repository == 'NCAR/CAM' }}

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          # Get all history, ensuring all branches are available for checkout
          fetch-depth: 0
          submodules: true

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5

      # Check out all submodules because we might :literalinclude: something from one
      - name: Checkout all submodules
        if: ${{ hashFiles('bin/git-fleximod') != '' }}
        run: bin/git-fleximod update -o

      # When you copy this into your repo, update the --site-root URL. 
      - name: Build docs using container
        id: build-docs
        run: |
          [[ -e doc ]] && cd doc
          ./build_docs_to_publish -d --site-root https://ncar.github.io/cam --verbose

      - name: Upload artifact
        uses: actions/upload-pages-artifact@0252fc4ba7626f0298f0cf00902a25c6afc77fa8  # v3
        with:
          # Upload publish dir
          path: 'doc/_publish'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@f33f41b675f0ab2dc5a6863c9a170fe83af3571e  # v4
